---
# specific OS supports wildcards
- name: Remove extraneous packages
  become: true
  ansible.builtin.apt:
    name: "{{ packages }}"
    state: absent
    autoremove: true
  vars:
    packages:
      - "java*"
      - "samba*"
      - "valgrind*"
      - "tignervnc"
  register: apt_remove_result
  failed_when: false
  changed_when: apt_remove_result.changed | default(false)

- name: Update
  become: true
  ansible.builtin.apt:
    name: '*'
    state: latest

- name: Install packages
  become: true
  ansible.builtin.apt:
    name: "{{ packages }}"
    state: present
  vars:
    packages:
      - zip
      - unzip

- name: Install packages tWAS 855x 32bit packages
  when:
    - twas855x|bool
    - ansible_architecture == 'x86_64'
  become: true
  ansible.builtin.command: dpkg --add-architecture i386

- name: dpkg --add-architecture i386 tWAS 855x 32bit packages
  when:
    - twas855x|bool
    - ansible_architecture == 'x86_64'
  become: true
  ansible.builtin.apt:
   name: "{{ packages }}"
   state: present
  vars:
    packages:
      - libxtst6
      - libgtk2.0-0
      - libc6:i386
      - libgcc1:i386
      - libgtk2.0-0:i386
      - libstdc++6:i386
      - libxft2
      - libxft2:i386
      - libxtst6:i386
