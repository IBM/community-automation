---
- name: Check if server.env exists
  ansible.builtin.stat:
    path: "{{ wlp_usr_dir }}/servers/{{ wl_server }}/server.env"
  register: server_env_file

- name: Create server.env with keystore_password if file does not exist
  when: not server_env_file.stat.exists
  block:
    - name: Create server.env file with keystore_password
      ansible.builtin.copy:
        content: "keystore_password={{ wlp_keystore_password }}\n"
        dest: "{{ wlp_usr_dir }}/servers/{{ wl_server }}/server.env"
        mode: '0644'

    - name: Display creation status
      ansible.builtin.debug:
        msg: "server.env created with keystore_password"

- name: Process server.env if it exists
  when: server_env_file.stat.exists
  block:
    - name: Read server.env contents
      ansible.builtin.slurp:
        path: "{{ wlp_usr_dir }}/servers/{{ wl_server }}/server.env"
      register: server_env_contents

    - name: Decode server.env contents
      ansible.builtin.set_fact:
        server_env_decoded: "{{ server_env_contents.content | b64decode }}"

    - name: Check if keystore_password exists in server.env
      ansible.builtin.set_fact:
        has_keystore_password: "{{ server_env_decoded | regex_search('^keystore_password=', multiline=True) is not none }}"

    - name: Add keystore_password if missing
      when: not has_keystore_password
      ansible.builtin.lineinfile:
        path: "{{ wlp_usr_dir }}/servers/{{ wl_server }}/server.env"
        line: "keystore_password={{ wlp_keystore_password }}"
        create: false
        mode: '0644'

    - name: Display status
      ansible.builtin.debug:
        msg: "{{ 'keystore_password already exists in server.env' if has_keystore_password else 'keystore_password added to server.env' }}"

